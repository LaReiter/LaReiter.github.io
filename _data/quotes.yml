- en: "It is funny how those preaching life advice are the ones who barely stay afloat."
  da: "Det er paradoksalt, hvordan dem der deler livsråd, ofte er dem der kæmper mest."

- en: "Most people lie to themselves, but only a few are really aware that this is happening."
  da: "De fleste lyver over for dem selv, men kun en håndfuld ved at de faktisk gør det."

- en: "Most of us desperately seek ways to make ourselves visible in the mass. Others seek ways to vanish completely."
  da: "De fleste af os ønsker desperat at blive set og hørt. Andre at forsvinde."

- en: "We all believe so strongly in our concept of reality, that we are completely oblivious to the illusion that it presents."
  da: "Vi lever os så meget ind i vores egen virkelighed, at vi bliver blinde over for den illusion, den faktisk er."

- en: "You can't be successful until you define success."
  da: "Du kan ikke blive succesfuld, før du definerer succes."

- en: "What happens when there is nothing left to criticize. What will the critics do?"
  da: "Hvad gør kritikerne, når der ikke er noget tilbage at kritisere?"

- en: "If one person believes one thing, and another believes another thing, this isn't evidence that the subject is interpretative. It is evidence that we perceive it as such."
  da: "Hvis én person mener ét og en anden person noget andet, så er det ikke bevis for at emnet er op til fortolkning. Det er et bevis for at vi opfatter det sådan."

- en: "Saying you are right based on your credentials, is like saying you are right because of your cool hat."
  da: "At sige man har ret baseret på hvad man har præsteret, er som at sige at man har ret fordi man har den sejeste hat."

- en: "If life is meaningless, you have nothing to lose. If life has meaning, you know how to live. In either case, you have fuel to push forward."
  da: "Hvis livet er meningsløst, har du intet at miste. Hvis livet har mening, så ved du hvad du skal. Uanset hvad du mener, så bør det være benzin til din motor."

- en: "Those who suffer are the ones who care."
  da: "Dem, der lider, er dem, der føler for noget."

- en: "Generally speaking, we know what is right for us, but usually do what is wrong."
  da: "Vi ved typisk, hvad der er godt for os, men gør som oftest det modsatte."

- en: "We choose what is easy today, and suffer more than we could have in the future."
  da: "Vi vælger de nemme løsninger i dag, og lider mere end vi burde i morgen."

- en: "Many of us believe we could have foreseen what just transpired. Meanwhile, studies confirm again and again that we are horrible at predicting the future. This illustrates the overconfidence bias."
  da: "Mange af os bilder os ind, at vi kunne have forudset, hvad der netop skete. Alt i mens at studier bekræfter hvor dårlige vi mennesker er til at forudse fremtiden. Dette illustrerer menneskets overmodighed."

- en: "Economists consider humans rational agents. Still, most people choose to use one second every day for many years deleting commercial mails, rather than using 10 seconds one day to unsubscribe."
  da: "Økonomer kalder mennesket en rationel agent. Samtidig vælger de fleste mennesker at bruge et sekund hver dag resten af livet på at slette nyhedsbreve, i stedet for at bruge 10 sekunder på én dag til at afmelde sig."

- en: "When your inner world suddenly becomes chaotic, know that the world outside has barely changed."
  da: "Når din indre verden pludselig bliver kaotisk, husk at verden udenfor er næsten den samme."

- en: "Life is made up of chapters - each of which we can manage. It is the transition between each that we struggle with."
  da: "Livet består af kapitler, der hver for sig er tålelige. Det er overgangene vi kæmper med."

- en: "I think loss aversion is the main reason we are not taking the actions that can advance our lives. One step back and two steps forward is perceived as a loss."
  da: "Tabsaversion er den primære grund til at vi ikke avancerer vores liv. Et skridt tilbage og to skridt frem opfattes som et samlet tab."

- en: "As we grow older, we question less and assume more. Sometimes, all it takes is a child's curiosity to remind us just how little we know."
  da: "Når vi bliver voksne, stiller vi færre spørgsmål og antager mere. Oftest kræver det et barns nysgerrighed at indse, præcis hvor lidt vi faktisk ved."

- en: "Is it our purpose to maximize memories that will die with us and our closest relatives? Or should we shape something that time cannot destroy? In other words, should we maximize experiences or contribution to humanity?"
  da: "Er det vores formål at maksimere minder, der vil dø med os og vores nærmeste? Eller bør vi forme noget, som tiden ikke kan slide op? Med andre ord: Skal vi maksimere det oplevede, eller det bestående?"
