<style>
article::after {
  content: "";
  display: table;
  clear: both;
}

.posts-images {
  float: right;
  margin: 0 0 2em 2em;
  display: flex;
  flex-direction: column;
  gap: 1em;
  width: 190px;
}

.posts-images figure {
  margin: 0;
}

.posts-images img {
  width: 100%;
  border-radius: 6px;
  border: 1px solid rgba(56, 189, 248, 0.18);
  display: block;
  transition: border-color .2s, box-shadow .2s;
}

.posts-images img:hover {
  border-color: rgba(56, 189, 248, 0.5);
  box-shadow: 0 0 16px rgba(56, 189, 248, 0.1);
}

.posts-images figcaption {
  font-size: .7em;
  font-family: "JetBrains Mono", monospace;
  color: rgba(56, 189, 248, 0.78);
  text-align: center;
  margin-top: .4em;
  letter-spacing: 0.04em;
}

.archive {
  list-style: none;
  padding: 0;
  margin: 0;
}

.archive li {
  display: flex;
  align-items: baseline;
  gap: 1.2em;
  padding: .7em 0;
  border-bottom: 1px solid rgba(56, 189, 248, 0.07);
}

.archive li:last-child {
  border-bottom: none;
}

.archive time {
  font-family: "JetBrains Mono", monospace;
  font-size: .76em;
  color: rgba(56, 189, 248, 0.78);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 7.5em;
}

.archive a {
  color: #c4d4e0;
  font-weight: 500;
  font-size: .97em;
  transition: color .15s;
  text-decoration: none;
}

.archive a:hover {
  color: #38bdf8;
}

@media (max-width: 600px) {
  .posts-images {
    float: none;
    flex-direction: row;
    width: 100%;
    margin: 0 0 1.5em 0;
  }
  .posts-images figure {
    flex: 1;
  }
  .archive li {
    flex-direction: column;
    gap: .25em;
  }
}
</style>

<article>
  <header><h1>{{ include.title | default: page.title }}</h1></header>

  <div class="posts-images">
    <figure>
      <img src="/assets/expl.png" alt="Original creation">
      <figcaption>// original</figcaption>
    </figure>
    <figure>
      <img src="/assets/expl2.png" alt="After generative enhancement">
      <figcaption>// generated</figcaption>
    </figure>
  </div>

  <ul class="archive">
    {% for post in site.posts %}
    <li>
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
      {% if post.external_url %}
        <a href="{{ post.external_url }}" target="_blank" rel="noopener">{{ post.title }}</a>
      {% else %}
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</article>
